---
- name: Install Nginx and Serve static website
  hosts: servers
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: latest
        update_cache: yes

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy webPage
      copy:
        src: index.html
        dest: /var/www/html/index.html

